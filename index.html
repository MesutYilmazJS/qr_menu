<!DOCTYPE html>
<html lang="tr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium QR Menü</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f9f8f6',
                            100: '#f0ece3',
                            500: '#b89876', // Premium Gold/Brown
                            800: '#4a3f35', // Dark Wood
                            900: '#1a1816', // Deep Background
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-brand-50 text-brand-900 font-sans antialiased selection:bg-brand-500 selection:text-white">

    <!-- Header Section -->
    <header class="sticky top-0 z-50 bg-brand-50/90 backdrop-blur-md border-b border-brand-100 px-4 py-4 transition-all duration-300" id="main-header">
        <div class="flex justify-between items-center max-w-7xl mx-auto">
            <div>
                <h1 class="text-2xl font-serif font-bold text-brand-900 tracking-tight">La Brasserie</h1>
                <p class="text-xs text-brand-500 font-medium uppercase tracking-widest">Fine Dining</p>
            </div>
            <div class="flex items-center gap-2">
                <!-- Google Review Icon -->
                <button id="review-toggle-btn" class="w-10 h-10 flex items-center justify-center rounded-full bg-brand-100 text-brand-800 hover:bg-white hover:shadow-sm transition-all" title="Bizi Değerlendirin">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                </button>
                <!-- Search Icon -->
                <button id="search-toggle-btn" class="w-10 h-10 flex items-center justify-center rounded-full bg-brand-100 text-brand-800 hover:bg-brand-500 hover:text-white transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
            </div>
        </div>

        <!-- Search Bar (Hidden by default) -->
        <div id="search-container" class="hidden mt-4 overflow-hidden transition-all duration-300">
            <div class="relative max-w-7xl mx-auto">
                <input type="text" id="search-input" placeholder="Menüde arayın..." class="w-full bg-white border border-brand-100 text-brand-900 text-sm rounded-full focus:ring-1 focus:ring-brand-500 focus:border-brand-500 block pl-10 p-2.5 transition-colors placeholder-brand-800/50 outline-none">
                <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-brand-500">
                    <svg class="w-4 h-4" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 20">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 19-4-4m0-7A7 7 0 1 1 1 8a7 7 0 0 1 14 0Z"/>
                    </svg>
                </div>
            </div>
        </div>

        <!-- Category Nav -->
        <nav class="mt-4 -mx-4 px-4 overflow-x-auto no-scrollbar scroll-smooth category-nav-container max-w-7xl mx-auto">
            <div class="flex space-x-3 w-max pb-2 md:mx-auto" id="category-container">
                <!-- Categories will be injected here via JS -->
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-8 pb-24 min-h-screen">
        <h2 id="current-category-title" class="text-2xl font-serif font-semibold mb-8 capitalize md:text-center text-brand-800">Menü</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 lg:gap-8" id="menu-container">
            <!-- Menu items will be injected here via JS -->
        </div>
    </main>

    <!-- Footer / Sticky Bottom Bar (Optional Cart/Table Info) -->
    <div class="fixed bottom-0 left-0 w-full bg-brand-900 text-white p-4 text-center text-sm font-medium z-40 transform translate-y-full transition-transform duration-300" id="bottom-bar">
    </div>

    <!-- Google Review Modal -->
    <div id="review-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">
        <!-- Backdrop -->
        <div id="review-backdrop" class="absolute inset-0 bg-brand-900/60 backdrop-blur-sm transition-opacity opacity-0"></div>
        
        <!-- Modal Content -->
        <div id="review-content" class="relative bg-white rounded-3xl p-6 md:p-8 w-full max-w-sm shadow-2xl transform scale-95 opacity-0 transition-all duration-300">
            <button id="close-review-modal" class="absolute top-4 right-4 text-brand-800/40 hover:text-brand-900 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
            
            <div class="text-center">
                <div class="w-16 h-16 bg-brand-50 rounded-full flex items-center justify-center mx-auto mb-4 border border-brand-100">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                </div>
                <h3 class="text-xl font-serif font-bold text-brand-900 mb-2">Deneyiminizi Paylaşın</h3>
                <p class="text-sm text-brand-800/70 mb-6">La Brasserie'deki deneyiminiz nasıldı? Google'da bize vereceğiniz 5 yıldızla büyümeye devam ediyoruz.</p>
                
                <div class="flex justify-center gap-1.5 mb-8 text-[#FBBC05]">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                </div>
                
                <a href="https://search.google.com/local/writereview?placeid=YOUR_PLACE_ID" target="_blank" rel="noopener noreferrer" class="block w-full bg-[#4285F4] hover:bg-[#3367D6] text-white font-medium py-3.5 px-4 rounded-xl transition-colors shadow-lg shadow-[#4285F4]/30 flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#fff"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#fff"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#fff"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#fff"/></svg>
                    Google'da Puan Ver
                </a>
            </div>
        </div>
    </div>

    <!-- Data -->
    <script src="js/data.js"></script>
    <!-- Classes -->
    <script src="js/classes/DataManager.js"></script>
    <script src="js/classes/MenuRenderer.js"></script>
    <!-- App Entry -->
    <script src="js/main.js"></script>
</body>
</html>
